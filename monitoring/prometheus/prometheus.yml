global:
  scrape_interval: 5s

scrape_configs:
  - job_name: 'notification-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - notification-service:8080

  - job_name: 'user-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - user-service:8080
