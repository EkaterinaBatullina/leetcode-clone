apiVersion: 1

kind: GrafanaDashboard

metadata:
  name: notification-dashboard
  folder: Notifications
  labels:
    app: notification-service

spec:
  json: >
    {
      "id": null,
      "title": "Notification Service Dashboard",
      "panels": [
        {
          "type": "graph",
          "title": "Sent Notifications",
          "targets": [
            {
              "expr": "notification_sent",
              "legendFormat": "{{job}}",
              "refId": "A"
            }
          ],
          "datasource": "Prometheus"
        },
        {
          "type": "graph",
          "title": "Failed Notifications",
          "targets": [
            {
              "expr": "notification_failed",
              "legendFormat": "{{job}}",
              "refId": "B"
            }
          ],
          "datasource": "Prometheus"
        },
        {
          "type": "graph",
          "title": "Notification Send Duration",
          "targets": [
            {
              "expr": "notification_send_duration_seconds",
              "legendFormat": "{{job}}",
              "refId": "C"
            }
          ],
          "datasource": "Prometheus"
        }
      ]
    }
