databaseChangeLog:
  - changeSet:
      id: add-updated-at-to-outbox-and-index
      author: Ekaterina Batullina
      changes:
        - addColumn:
            tableName: outbox_events
            columns:
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: CURRENT_TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            tableName: outbox_events
            indexName: idx_outbox_status_new_created
            columns:
              - column:
                  name: created_at
                  type: ASC
            where: "status = 'NEW'"