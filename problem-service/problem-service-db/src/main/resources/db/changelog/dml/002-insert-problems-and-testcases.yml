                     (gen_random_uuid(), '[-5,10,0,-15]', '0', FALSE, generated_id);
              
              INSERT INTO wrapper (id, problem_id, language_id, method_signature) VALUES
              (gen_random_uuid(), generated_id, 62, 'public int secondMax(int[] arr)'),
              (gen_random_uuid(), generated_id, 71, 'def second_max(arr: List[int]) -> int:');
              
