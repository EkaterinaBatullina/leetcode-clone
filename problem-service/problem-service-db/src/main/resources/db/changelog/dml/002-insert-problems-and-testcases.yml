              INSERT INTO wrapper (id, problem_id, language_id, method_signature) VALUES
              (gen_random_uuid(), generated_id, 62, 'public int arraySum(int[] arr)'),
              (gen_random_uuid(), generated_id, 71, 'def array_sum(arr: List[int]) -> int:');
              
