databaseChangeLog:
  - changeSet:
      id: create-triggers
      author: elise
      changes:
        - sql:
            sql: |
              CREATE EXTENSION IF NOT EXISTS pgcrypto;

              CREATE OR REPLACE FUNCTION update_timestamp()
              RETURNS TRIGGER AS $$
              BEGIN
                  NEW.updated_at = CURRENT_TIMESTAMP;
              RETURN NEW;
              END;
              $$ LANGUAGE plpgsql;

              CREATE TRIGGER set_updated_at
                  BEFORE UPDATE
                  ON problem
                  FOR EACH ROW
                  EXECUTE FUNCTION update_timestamp();

              CREATE OR REPLACE FUNCTION insert_problem_audit_log()
              RETURNS TRIGGER AS $$
              BEGIN
                  IF TG_OP = 'DELETE' THEN
                      INSERT INTO audit_log (id, problem_id, action_type, old_data)
                      VALUES (
                          gen_random_uuid(),
                          OLD.id,
                          TG_OP,
                          to_jsonb(OLD)
                      );
              ELSE
                      INSERT INTO audit_log (id, problem_id, action_type, old_data, new_data)
                      VALUES (
                          gen_random_uuid(),
                          COALESCE(OLD.id, NEW.id),
                          TG_OP,
                          to_jsonb(OLD),
                          to_jsonb(NEW)
                      );
              END IF;
              RETURN NEW;
              EXCEPTION
                  WHEN undefined_table THEN
                      RAISE NOTICE 'Audit_log table does not exist. Skipping audit entry.';
              RETURN NEW;
              END;
              $$ LANGUAGE plpgsql;

              CREATE TRIGGER audit_problem_changes
                  AFTER UPDATE OR DELETE  
              ON problem
                  FOR EACH ROW
                  EXECUTE FUNCTION insert_problem_audit_log();
            splitStatements: false
            endDelimiter: //