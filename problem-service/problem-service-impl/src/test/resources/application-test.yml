spring:
  cloud:
    consul:
      enabled: false
  config:
    activate:
      on-profile: test
  datasource:
    hikari:
      maximum-pool-size: 2
  jpa:
    hibernate:
      ddl-auto: create

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yml
    drop-first: false

  kafka:
    listener:
      auto-startup: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9000

publish:
  ack:
    timeout: 5000